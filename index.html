<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colour Palette Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0;}
        body {
            font-family: 'VT323', monospace;
            background-image: url('https://64.media.tumblr.com/b4e836bfce7f889998e4e2afa341f1d9/4ad8e7d86566322e-1b/s540x810/527984cd2de7a293a3350747d5867de07cedbc85.gifv'); 
            background-color: #050505; 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            
            box-shadow: inset 0 0 0 2000px rgba(40, 36, 46, 0.8);
            
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            
            color: #FFFFFF;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .app-container { 
            width: 100%; max-width: 500px; text-align: center;
        }

        h1 {
            font-size: 3.5rem; margin-bottom: 5px; letter-spacing: 4px; text-shadow: 2px 2px 0px #000;
        }

        .subtitle {
            font-size: 1.5rem; margin-bottom: 40px; text-shadow: 1px 1px 0px #000;
        }

        .input-group {
            margin-bottom: 20px;text-align: left;
        }

        label {
            display: block; font-size: 1.5rem; margin-bottom: 10px; text-shadow: 1px 1px 0px #000;
        }

        input[type="number"],
        input[type="file"] { width: 100%; padding: 10px; background: rgba(0, 0, 0, 0.8); border: 2px solid #FFFFFF;
            color: #FFFFFF; font-family: 'VT323', monospace; font-size: 1.3rem;
        }

        input[type="file"]::file-selector-button { background: transparent; border: 1px solid #FFFFFF; color: #FFFFFF;
            font-family: 'VT323', monospace; padding: 5px 10px; cursor: pointer; margin-right: 15px;
            text-transform: uppercase;
        }

        input[type="file"]::file-selector-button:hover { background: #FFFFFF; color: #000000; }

        input:focus { outline: none; border-style: dashed; }
        #preview { margin-top: 20px; margin-bottom: 10px; padding: 20px; border: 2px dashed #FFFFFF;
            background: rgba(0, 0, 0, 0.5); min-height: 120px; display: flex;
            flex-direction: column; justify-content: center; align-items: center;}

        #no-image-msg { font-size: 1.3rem; }

        #image-preview { border: 2px solid #FFFFFF; margin-top: 10px; max-width: 50%; }

        button { background-color: transparent; color: #FFFFFF; border: 2px solid #FFFFFF;
            padding: 12px 24px; font-size: 1.8rem; font-family: 'VT323', monospace; letter-spacing: 3px;
            text-transform: uppercase; cursor: pointer; width: 100%; margin-top: 5px; transition: 0.2s; }

        button:hover { background-color: #FFFFFF; color: #000000; }

        #output-text { margin-top: 30px;  font-size: 1.5rem; text-shadow: 2px 2px 0px #000; }

        canvas { border: 2px solid #FFFFFF; width: 100%; margin-top: 15px; image-rendering: pixelated; }
        
        .footnote{position: fixed; bottom: 15px; width:100%; text-align:center; font-size:1.2rem;
                color: rgba(255,255,255,0.7); text-shadow: 1px 1px 0px #000;
                letter-spacing: 1.5px; pointer-events: none;}
        .footnote a{
            color: inherit; text-decoration: underline; transition: 0.2s; pointer-events:auto;
        }
        .footnote a: hover{
            color: #FFFFFF; text-shadow: 2px 2px 0px #000;
        }
   </style>
</head>
<body>
    <div class="app-container">
        <h1>PALETTE GENERATOR</h1>
        <p class="subtitle"></p>

        <form id="upload-form">
            <div class="input-group">
                <label for="colourCount">Number of colors to find:</label>
                <input type="number" id="colourCount" value="5" min="2" max="8">
            </div>

            <div class="input-group">
                <input type="file" id="file-input" accept="image/*">
            </div>
            
            <div id="preview">
                <p id="no-image-msg">No Image Selected</p>
                <img id="image-preview" src="" alt="Image Preview" style="display:none; max-width:50%;">
            </div>
            <canvas id="canvas" style="display:none;"></canvas>
            <button type="submit" id="submit-button">Extract Colours</button>
            <div id="output-text"></div>
        </form>
    </div>
    <div class="footnote">
        <a href="https://www.cs.mun.ca/~atamim/" target="_blank">Made By Arham</a>
    </div>
    <script src="kmeans.js"></script>
    <script src="index.js"></script>
</body>
</html>
